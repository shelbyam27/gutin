<!doctype html>
<html><head><meta charset="utf-8"><title>BTS fix</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>html,body,#map{height:100%;margin:0}</style></head>
<body><div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const fix = {"lat": -6.201729886695819, "lon": 106.8193768458277, "accuracy_m": 61.627908378707154};
const towers = [{"key": "lte:510-10-1001-12345", "lat": -6.2, "lon": 106.816, "distance_m": 242.66340113886892, "source": "inline"}, {"key": "lte:510-10-1001-12346", "lat": -6.203, "lon": 106.82, "distance_m": 156.0, "source": "inline"}, {"key": "lte:510-10-1001-12347", "lat": -6.1985, "lon": 106.8225, "distance_m": 570.7328257438439, "source": "inline"}, {"key": "lte:510-10-1001-12348", "lat": -6.2015, "lon": 106.814, "distance_m": 793.0306898619209, "source": "inline"}];
const map = L.map('map').setView([fix.lat, fix.lon], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM'}).addTo(map);
L.marker([fix.lat, fix.lon]).addTo(map)
  .bindPopup('Estimated fix<br>accuracy ±'+Math.round(fix.accuracy_m)+' m').openPopup();
L.circle([fix.lat, fix.lon],{radius:fix.accuracy_m,color:'red',fillOpacity:0.05}).addTo(map);
for (const t of towers) {
  L.circleMarker([t.lat,t.lon],{radius:6,color:'#1e7'}).addTo(map)
    .bindPopup('BTS '+t.key+'<br>d≈'+Math.round(t.distance_m)+' m<br>src: '+t.source);
  L.circle([t.lat,t.lon],{radius:t.distance_m,color:'#1e7',fillOpacity:0.05,weight:1}).addTo(map);
}
</script></body></html>
